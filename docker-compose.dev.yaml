version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: boardsync-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: boardsync_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - boardsync-network

volumes:
  pgdata:

networks:
  boardsync-network:
    driver: bridge