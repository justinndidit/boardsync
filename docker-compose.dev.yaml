version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: boardsync-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: boardsync_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - boardsync-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: boardsync-mailhog-dev
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - boardsync-network

volumes:
  pgdata:

networks:
  boardsync-network:
    driver: bridge
