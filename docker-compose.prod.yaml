version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: boardsync-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - boardsync-network

  api:
    build:
      context: ./server/BoardSync.Api
      dockerfile: Dockerfile
    container_name: boardsync-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Pooling=true;Minimum Pool Size=10;Maximum Pool Size=100
      AllowedOrigins__0: ${APP_ORIGIN}
      JwtSettings__Secret: ${JWT_SECRET}
      JwtSettings__Issuer: ${JWT_ISSUER}
      JwtSettings__Audience: ${JWT_AUDIENCE}
      EmailSettings__SmtpServer: ${SMTP_SERVER}
      EmailSettings__SenderEmail: ${SENDER_EMAIL}
      EmailSettings__Username: ${SMTP_USERNAME}
      EmailSettings__Password: ${SMTP_PASSWORD}
      EmailSettings__BaseUrl: ${APP_BASE_URL}
    expose:
      - "8080"
    networks:
      - boardsync-network

  ui:
    build:
      context: ./boardsync-ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: boardsync-ui
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
    networks:
      - boardsync-network

volumes:
  pgdata:

networks:
  boardsync-network:
    driver: bridge